<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>form</title>
<style>
body{
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    background:black;
    color:white;
    font-family:Arial, Helvetica, sans-serif;
}

h2{
    margin-bottom:30px;
}

form{
    width:600px;
}

.form-group{
    display:flex;
    gap:20px;          
    margin-bottom:20px;
}

input, select, textarea{
    flex:1;
    padding:10px;
    background:black;
    color:white;
    border:1px solid gray;
}

textarea{
    height:120px;
}

button{
    padding:10px 25px;

    background:black;
    color:white;
    border:1px solid white;
    cursor:pointer;
}

button:hover{
    background:white;
    color:black;
   
}


</style>
    </head>
<body>
    <section class="contact">
    <h2>Contact me</h2>

    <form class="contact-form">
        <div class="form-group">
            
<input type="text"  placeholder="Name">
<input type="email"  placeholder="Email">
</div>

<div class="form-group">
<input type="text" placeholder="Phone Number">
<select>
<option>Service Of Interest</option>

</select>
</div>

<div class="form-group">
<input type="text" placeholder="Timeline">
<textarea placeholder="Project Details..."></textarea>
</div>

<button>Send</button>
</section>
</form>
</body>
</html>
