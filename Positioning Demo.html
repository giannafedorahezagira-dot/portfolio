<!DOCTYPE html>
<html>
<head>
<style>
body {
  margin: 0;
  position: relative;
  height: 100vh;
}

/* Parent */
.parent {
  position: relative;
  height: 300px;
  border: 1px solid black;
  overflow: hidden;
}

/* Triangle shape */
.triangle {
  position: fixed;
  
  bottom: 0;
  right: -50px;
  width: 120px;
  height: 120px;
  background: orange;
  transform: rotate(45deg);

  /* Animation */
  animation: moveRotate 4s infinite;
}

/* Animation keyframes */
@keyframes moveRotate {
  0% {
    transform: rotate(45deg) scale(1);
    background: orange;
  }
  50% {
    transform: rotate(60deg) scale(1.2);
    background: yellow;
  }
  100% {
    transform: rotate(45deg) scale(1);
    background: orange;
  }
}
</style>
</head>

<body>

<div class="parent">
  <div class="triangle"></div>
</div>

</body>
</html>
